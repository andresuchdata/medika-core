name: Deploy Frontend

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: https://api.sehatflow.my.id
          NEXT_TELEMETRY_DISABLED: 1
        run: bun run build

      - name: Package standalone
        run: |
          cp -r public .next/standalone/public
          cp -r .next/static .next/standalone/.next/static
          tar -czf frontend.tar.gz -C .next/standalone .

      - name: Deploy to server
        env:
          SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          HOST: ${{ secrets.SERVER_HOST }}
          USER: ${{ secrets.SERVER_USER }}
        run: |
          echo "$SSH_KEY" > deploy_key && chmod 600 deploy_key
          scp -i deploy_key -o StrictHostKeyChecking=no frontend.tar.gz $USER@$HOST:/opt/sehatflow/
          ssh -i deploy_key -o StrictHostKeyChecking=no $USER@$HOST << 'REMOTE'
            set -e
            sudo mkdir -p /opt/sehatflow/frontend-app
            sudo tar -xzf /opt/sehatflow/frontend.tar.gz -C /opt/sehatflow/frontend-app --overwrite
            sudo chown -R ubuntu:ubuntu /opt/sehatflow/frontend-app
            pm2 restart sehatflow-fe 2>/dev/null || pm2 start /opt/sehatflow/frontend-app/server.js \
              --name sehatflow-fe \
              --env production \
              -e PORT=3000
            pm2 save
          REMOTE
          rm deploy_key
